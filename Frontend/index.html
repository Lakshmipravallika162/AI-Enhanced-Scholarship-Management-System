<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarAI – Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🎓</span>
      <h1>ScholarAI</h1>
      <p>AI-Enhanced Scholarship Management System</p>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
      <p class="auth-hint">Admin: admin@scholarship.com / admin123</p>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="auth-form hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Choose password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <div id="authMsg" class="msg hidden"></div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
